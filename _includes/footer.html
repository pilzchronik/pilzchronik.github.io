<footer class="site-footer h-card">
  <div class="wrapper" style="padding: 40px 0; text-align: center; border-top: 1px solid #e8e8e8; margin-top: 60px;">
    
    <div style="margin-bottom: 20px;">
      <a href="{{ '/ueber/' | relative_url }}" style="color: #666; text-decoration: none; margin: 0 15px;">Über diese Seite</a>
      <span style="color: #ccc;">|</span>
      <a href="{{ '/impressum/' | relative_url }}" style="color: #666; text-decoration: none; margin: 0 15px;">Impressum</a>
      <span style="color: #ccc;">|</span>
      <a href="{{ '/datenschutz/' | relative_url }}" style="color: #666; text-decoration: none; margin: 0 15px;">Datenschutz</a>
      <span style="color: #ccc;">|</span>
      <a href="{{ '/suche/' | relative_url }}" style="color: #666; text-decoration: none; margin: 0 15px;">Suche</a>
    </div>

    <div style="font-size: 0.85em; color: #999;">
      &copy; {{ site.time | date: '%Y' }} {{ site.title }}
      <span style="margin: 0 5px;">•</span> 
      
      <span id="kontakt-placeholder">Wird geladen...</span>

      <script>
        // Wir zerlegen die Adresse, damit Bots sie nicht finden
        var teil1 = "pilz";
        var teil2 = "gmx.at";
        var linkText = teil1 + "@" + teil2;
        
        // Das Skript baut den Link erst im Browser zusammen
        document.getElementById("kontakt-placeholder").innerHTML = 
          '<a href="mailto:' + linkText + '" style="color: #999; text-decoration: none;">' + linkText + '</a>';
      </script>
      
      <noscript>
        pilz (at) gmx.at
      </noscript>

    </div>

  </div>
<script>
  // Chatling-Bot: wird nur geladen, wenn der Dienst erreichbar ist.
  // Bei Fehler (Service eingestellt, Timeout, JS-Fehler) verschwindet das Widget lautlos.
  (function() {
    try {
      window.chtlConfig = { chatbotId: "1593533597" };
      var s = document.createElement("script");
      s.async = true;
      s.setAttribute("data-id", "1593533597");
      s.id = "chtl-script";
      s.type = "text/javascript";
      s.src = "https://chatling.ai/js/embed.js";
      s.onerror = function() {
        // Skript nicht erreichbar – Widget still entfernen, Flag setzen
        window.chtlUnavailable = true;
        try { s.parentNode && s.parentNode.removeChild(s); } catch(e) {}
      };
      document.currentScript
        ? document.currentScript.parentNode.appendChild(s)
        : document.body.appendChild(s);
    } catch(e) {
      // Kein Absturz der Seite bei unerwarteten Fehlern
    }
  })();
</script>
</footer>
