title: Pilz-Chronik Bonusseite
email: "pilz (at) gmx.at"
description: >-
  Digitale Ergänzung und Werkstatt zur gedruckten Pilz-Chronik (Band 1 & 2).
# Wurzel-Adresse: Repo heißt pilzchronik.github.io → baseurl leer.
# (Der GitHub-Actions-Build setzt baseurl ohnehin automatisch aus dem Repo-Namen;
#  dieser Wert gilt für lokale Builds/Vorschau und Konsistenz.)
baseurl: ""
url: "https://pilzchronik.github.io"
lang: de

# Build settings
theme: minima
sass:
  sass_dir: _sass
future: true  # Zeige auch Posts mit zukünftigem Datum

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  intern:
    output: false
    # output war "true" → alle _intern-Dateien waren öffentlich erreichbar!
    # Auf "false" gesetzt am 2026-03-17 (Sicherheitskorrektur).
  unlisted:
    output: true
    # Sammlung "_unlisted" → Posts werden gerendert und sind per Permalink
    # erreichbar, sind aber nicht in site.posts. Damit automatisch ausgeschlossen
    # aus: Werkstatt-Listing, Korrekturen-/Neue-Funde-Tagseiten, Vor/Zurück-
    # Navigation, RSS-Feed (jekyll-feed) und Tag-Filter-Suche.
    # Zusatzgriffe pro Post: sitemap: false, unlisted: true (für noindex),
    # data-pagefind-ignore via Layout. Eingerichtet am 2026-05-05.

# Vom Build ausschließen (nicht als HTML generieren):
exclude:
  - _intern
  - suchdaten
  - vendor
  - MAINTENANCE.md
  - AENDERUNGEN-2026-02-11.md
  - ANLEITUNG_werkstatt.md
  - Blumenau_Geschichte.md

# Navigation
# WICHTIG: header_pages muss ganz links stehen (keine Leerzeichen davor!)
header_pages:
  - index.md
  - werkstatt.md
  - orte.md
  - nachweise.md
