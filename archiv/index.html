*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}

#hdr{background:#1e293b;color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:100;}

.stats{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}

.stat.g{background:#166534;}.stat.t{background:#92400e;}.stat.a{background:#4c1d95;}
.prog{height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:8px;overflow:hidden;}
.prog-b{height:100%;background:#22c55e;border-radius:2px;transition:width .4s;}
#toolbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:8px 12px;position:sticky;top:72px;z-index:99;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
#toolbar select{font-size:12px;padding:5px 8px;border:1px solid #cbd5e1;border-radius:8px;background:#f8fafc;}
.tbtn{font-size:12px;padding:5px 10px;border:none;border-radius:8px;font-weight:600;cursor:pointer;white-space:nowrap;}
.tbtn.blue{background:#3b82f6;color:#fff;}
.tbtn.green{background:#16a34a;color:#fff;}
.tbtn.indigo{background:#4f46e5;color:#fff;}
.tbtn.amber{background:#d97706;color:#fff;}
#list{padding:10px 12px 40px;}
.sec-hdr{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin:18px 0 6px;}
.sub-hdr{font-size:12px;font-weight:600;color:#475569;margin:10px 0 4px;padding:4px 8px;background:#e2e8f0;border-radius:6px;}
.card{background:#fff;border-radius:12px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden;border-left:4px solid #cbd5e1;}
.card.HH{border-left-color:#dc2626;}.card.MI{border-left-color:#f59e0b;}.card.OPT{border-left-color:#94a3b8;}
.card-hd{display:flex;align-items:flex-start;padding:10px 12px;cursor:pointer;gap:8px;}
.card-hd-left{flex:1;min-width:0;}
.card-sig{font-size:11px;font-weight:700;color:#64748b;font-family:monospace;}
.card-person{font-size:14px;font-weight:600;color:#0f172a;margin:2px 0;}
.card-datum{font-size:11px;color:#94a3b8;}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.pbadge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;color:#fff;}
.pbadge.HH{background:#dc2626;}.pbadge.MI{background:#f59e0b;}.pbadge.OPT{background:#94a3b8;}
.spill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.spill.Offen{background:#f1f5f9;color:#64748b;border:1px solid #cbd5e1;}
.spill.Gefunden{background:#dcfce7;color:#166534;}
.spill.Teilbefund{background:#fef3c7;color:#92400e;}
.spill.Ausdruck{background:#ede9fe;color:#4c1d95;}
.spill.NichtGefunden{background:#fee2e2;color:#991b1b;}
.preview{font-size:11px;color:#64748b;font-style:italic;margin-top:3px;}
.card-body{display:none;padding:0 12px 12px;border-top:1px solid #f1f5f9;}
.aufgabe{background:#f8fafc;border-radius:8px;padding:8px 10px;font-size:13px;color:#334155;margin:10px 0 8px;line-height:1.5;}
.statrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.sbtn{padding:6px 11px;border:2px solid #e2e8f0;border-radius:20px;font-size:12px;font-weight:600;background:#fff;cursor:pointer;color:#475569;}
.sbtn.selG{border-color:#16a34a;background:#dcfce7;color:#166534;}
.sbtn.selT{border-color:#d97706;background:#fef3c7;color:#92400e;}
.sbtn.selA{border-color:#7c3aed;background:#ede9fe;color:#4c1d95;}
.sbtn.selN{border-color:#dc2626;background:#fee2e2;color:#991b1b;}
.sbtn.selO{border-color:#94a3b8;background:#f1f5f9;color:#64748b;}
.field-lbl{font-size:11px;font-weight:700;color:#64748b;margin-bottom:4px;text-transform:uppercase;}
.ffs{width:100%;padding:8px 10px;border:2px solid #16a34a;border-radius:8px;font-size:14px;background:#f0fdf4;font-family:inherit;resize:vertical;min-height:40px;}
.ftr{width:100%;padding:8px 10px;border:2px solid #cbd5e1;border-radius:8px;font-size:13px;background:#f8fafc;font-family:inherit;resize:vertical;min-height:60px;margin-top:8px;}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;display:none;z-index:9999;}
.modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);overflow-y:auto;}
.mbox{background:#fff;margin:20px auto;border-radius:16px;max-width:800px;overflow:hidden;}
.mhdr{background:#1e293b;color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;}
.mhdr h2{font-size:16px;font-weight:700;}
.mclose{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;}
.mbody{padding:16px;}
.mstats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.mst{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.mst.g{background:#dcfce7;color:#166534;}.mst.t{background:#fef3c7;color:#92400e;}
.mst.a{background:#ede9fe;color:#4c1d95;}.mst.n{background:#fee2e2;color:#991b1b;}
.mst.o{background:#f1f5f9;color:#64748b;}.mst.tot{background:#1e293b;color:#fff;}

.rtable{width:100%;border-collapse:collapse;font-size:12px;}
.rtable th{background:#f1f5f9;padding:7px 8px;text-align:left;font-weight:700;color:#475569;font-size:11px;}
.rtable td{padding:7px 8px;border-bottom:1px solid #f1f5f9;vertical-align:top;}
.rsec{background:#e2e8f0;font-weight:700;font-size:11px;color:#334155;padding:5px 8px;}
.rstat{font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;}
.rstat.G{background:#dcfce7;color:#166534;}.rstat.T{background:#fef3c7;color:#92400e;}
.rstat.A{background:#ede9fe;color:#4c1d95;}.rstat.N{background:#fee2e2;color:#991b1b;}

@media print{

  #printoverlay .po-toolbar{display:none!important;}

#printoverlay{
  display:none;position:fixed;inset:0;z-index:2000;background:#fff;overflow-y:auto;padding:20px;

}
#printoverlay .po-toolbar{

#printoverlay .po-toolbar h3{font-size:14px;font-weight:700;margin:0;}
#printoverlay .po-toolbar .po-hint{font-size:11px;color:#94a3b8;}
#printoverlay .po-toolbar button{background:#3b82f6;border:none;color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
#printoverlay table{width:100%;border-collapse:collapse;}
#printoverlay th{background:#1e293b;color:#fff;padding:6px 8px;text-align:left;font-size:11px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
#printoverlay td{padding:5px 8px;border-bottom:1px solid #eee;vertical-align:top;}
#printoverlay .sec-row td{background:#e2e8f0;font-weight:700;font-size:11px;color:#334155;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
#printoverlay .arc-row td{background:#1e293b;color:#fff;font-weight:700;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
</style>

  {id:"f03",ar:"StA Freiberg",sub:"Gerichtsbuecher AG Sayda - Ergaenzungen",sig:"GB AG Sayda",pr:"MI",pe:"Michael Pültzen - Schoeppe-Eintrag",au:"GB Bd. 01, Bl. 160b (01.01.1562) im Original prüfen und vollständig abschreiben.",da:"01.01.1562"},

  // ── GEGENPRÜFUNG ─────────────────────────────────────────────────
  {id:"g01",ar:"Gegenpruefe",sub:"GB-KB Gegenpruefung und Namensvarianten",sig:"-",pr:"MI",pe:"Joseph Pültz - 1. Heirat",au:"Trauungseintrag im Kirchenbuch suchen und mit GB-Beleg abgleichen.",da:"09.05.1574"},
  {id:"g02",ar:"Gegenpruefe",sub:"GB-KB Gegenpruefung und Namensvarianten",sig:"-",pr:"MI",pe:"Heirat Joseph Pültz - 3. Ehe",au:"Trauungseintrag suchen (3. Ehe nach Tod Sybillas, ab 02.02.1617).",da:"ca. 1617-1620"},
  {id:"g03",ar:"Gegenpruefe",sub:"GB-KB Gegenpruefung und Namensvarianten",sig:"-",pr:"MI",pe:"Namensvarianten - Vollstaendige Kontrolle",au:"Pilz, Piltz, Pültz, Pülcz, Pultz, Pültzend, Pültzin, Piltzin, Biltz, Bültz, Bültzin - in allen bearbeiteten Registern kontrollieren.",da:"lfd."}

var SK = 'archiv2026v2';

function getAll() {
  try { return JSON.parse(localStorage.getItem(SK) || '{}'); }
  catch(e) { return {}; }
}
function getS(id) {
  var a = getAll(); return a[id] || {st:'Offen',fs:'',tr:''};
}
function setS(id, k, v) {
  var a = getAll();
  if (!a[id]) a[id] = {st:'Offen',fs:'',tr:''};
  a[id][k] = v;
  try { localStorage.setItem(SK, JSON.stringify(a)); } catch(e) {}
  updateStats();
}

function updateStats() {
  var a = getAll(), G=0,T=0,A=0,N=0, tot=TASKS.length;
  for (var i=0; i<TASKS.length; i++) {
    var s = (a[TASKS[i].id]||{}).st||'Offen';
    if(s==='Gefunden')G++; else if(s==='Teilbefund')T++;
    else if(s==='Ausdruck')A++; else if(s==='NichtGefunden')N++;
  }
  var done=G+T+A;
  var h = '<span class="stat">Gesamt: '+tot+'</span>';
  if(G) h += '<span class="stat g">Gefunden: '+G+'</span>';
  if(T) h += '<span class="stat t">Teilbefund: '+T+'</span>';
  if(A) h += '<span class="stat a">Ausdruck: '+A+'</span>';
  if(N) h += '<span class="stat" style="background:#7f1d1d">Nicht gef.: '+N+'</span>';
  h += '<span class="stat">Offen: '+(tot-done-N)+'</span>';
  document.getElementById('stats').innerHTML = h;
  document.getElementById('progbar').style.width = Math.round(done/tot*100)+'%';
}

function render() {
  var fA=document.getElementById('fA').value;
  var fP=document.getElementById('fP').value;
  var fS=document.getElementById('fS').value;
  var a=getAll();

  var filtered=[];
  for(var i=0;i<TASKS.length;i++){
    var t=TASKS[i];
    if(fA && t.ar!==fA) continue;
    if(fP && t.pr!==fP) continue;
    if(fS){ var cs=(a[t.id]||{}).st||'Offen'; if(cs!==fS) continue; }
    filtered.push(t);
  }

  var archivs=[],seen={};
  for(var i=0;i<filtered.length;i++){
    if(!seen[filtered[i].ar]){seen[filtered[i].ar]=true;archivs.push(filtered[i].ar);}
  }

  var h='';
  for(var ai=0;ai<archivs.length;ai++){
    var arc=archivs[ai];
    h+='<div class="sec-hdr">' + esc(arc) + '</div>';
    var subs=[],seenS={};
    for(var i=0;i<filtered.length;i++){
      if(filtered[i].ar!==arc)continue;
      if(!seenS[filtered[i].sub]){seenS[filtered[i].sub]=true;subs.push(filtered[i].sub);}
    }
    for(var si=0;si<subs.length;si++){
      var sub=subs[si];
      h+='<div class="sub-hdr">'+esc(sub)+'</div>';
      for(var i=0;i<filtered.length;i++){
        var t=filtered[i];
        if(t.ar!==arc||t.sub!==sub) continue;
        var s=getS(t.id);
        var stL=s.st==='NichtGefunden'?'Nicht gefunden':s.st==='Ausdruck'?'Ausdruck beantragt':s.st;
        var prev=s.fs?('<div class="preview">'+esc(s.fs.substring(0,60))+'</div>'):'';
        var btns='';
        var SL=['Gefunden','Teilbefund','Ausdruck','NichtGefunden','Offen'];
        var SN={'Gefunden':'Gefunden','Teilbefund':'Teilbefund','Ausdruck':'Ausdruck beantragt','NichtGefunden':'Nicht gefunden','Offen':'Offen'};
        var SC={'Gefunden':'selG','Teilbefund':'selT','Ausdruck':'selA','NichtGefunden':'selN','Offen':'selO'};
        for(var k=0;k<SL.length;k++){
          var st2=SL[k];
          btns+='<button class="sbtn '+(s.st===st2?SC[st2]:'')+'" onclick="setSt(\''+t.id+'\',\''+st2+'\')">'+SN[st2]+'</button>';
        }
        h+='<div class="card '+t.pr+'" id="c-'+t.id+'">';
        h+='<div class="card-hd" onclick="tog(\''+t.id+'\')">';
        h+='<div class="card-hd-left">';
        h+='<div class="card-sig">'+esc(t.sig)+'</div>';
        h+='<div class="card-person">'+esc(t.pe)+'</div>';
        h+='<div class="card-datum">'+esc(t.da)+'</div>';
        h+=prev;
        h+='</div><div class="card-right">';
        h+='<span class="pbadge '+t.pr+'">'+t.pr+'</span>';
        h+='<span class="spill '+s.st+'">'+esc(stL)+'</span>';
        h+='</div></div>';
        h+='<div class="card-body" id="b-'+t.id+'">';
        h+='<div class="aufgabe">'+esc(t.au)+'</div>';
        h+='<div class="statrow">'+btns+'</div>';
        h+='<div class="field-lbl">Fundstelle / Folio</div>';
        h+='<textarea class="ffs" id="fs-'+t.id+'" placeholder="z.B. Bl. 47v, S. 133, Fol. 15r" oninput="sv(\''+t.id+'\',\'fs\',this.value)">'+esc(s.fs||'')+'</textarea>';
        h+='<div class="field-lbl" style="margin-top:10px">Transkription / Bemerkungen</div>';
        h+='<textarea class="ftr" id="tr-'+t.id+'" placeholder="Volltext, Namen, Paten, Zeugen, offene Fragen..." oninput="sv(\''+t.id+'\',\'tr\',this.value)">'+esc(s.tr||'')+'</textarea>';
        h+='</div></div>';
      }
    }
  }
  if(!h) h='<div style="padding:30px;text-align:center;color:#94a3b8">Keine Aufgaben für diese Filter.</div>';
  document.getElementById('list').innerHTML=h;
  updateStats();
}

function tog(id){
  var b=document.getElementById('b-'+id);
  b.style.display=b.style.display==='block'?'none':'block';
}
function setSt(id,st){
  setS(id,'st',st); render();
  setTimeout(function(){var b=document.getElementById('b-'+id);if(b)b.style.display='block';},20);
}
function sv(id,k,v){ setS(id,k,v); }

// ── GESAMTBERICHT ──────────────────────────────────────────────────
function showBericht(){
  var a=getAll(),G=0,T=0,A=0,N=0,O=0;
  for(var i=0;i<TASKS.length;i++){
    var s=(a[TASKS[i].id]||{}).st||'Offen';
    if(s==='Gefunden')G++; else if(s==='Teilbefund')T++;
    else if(s==='Ausdruck')A++; else if(s==='NichtGefunden')N++; else O++;
  }
  var sh='<span class="mst tot">Gesamt: '+TASKS.length+'</span>';
  sh+='<span class="mst g">Gefunden: '+G+'</span>';
  sh+='<span class="mst t">Teilbefund: '+T+'</span>';
  sh+='<span class="mst a">Ausdruck: '+A+'</span>';
  sh+='<span class="mst n">Nicht gef.: '+N+'</span>';
  sh+='<span class="mst o">Offen: '+O+'</span>';

  var h='<div class="mstats">'+sh+'</div>';
  h+='<div class="mactions">';
  h+='<button class="tbtn indigo" onclick="druckB(false)">Ausgefüllt drucken / PDF</button>';
  h+='<button class="tbtn blue" onclick="druckB(true)">Leer drucken (Notizblatt)</button>';
  h+='<button class="tbtn amber" onclick="kopiereText()">Als Text kopieren</button>';
  h+='</div>';
  h+='<table class="rtable"><thead><tr>';
  h+='<th>Signatur</th><th>Person / Datum</th><th>Status</th><th>Fundstelle</th><th>Transkription</th>';
  h+='</tr></thead><tbody>'+buildRows(false)+'</tbody></table>';
  document.getElementById('bBody').innerHTML=h;
  document.getElementById('mBericht').style.display='block';
}

function buildRows(leer){
  var archs=[],seen={};
  for(var i=0;i<TASKS.length;i++){
    if(!seen[TASKS[i].ar]){seen[TASKS[i].ar]=true;archs.push(TASKS[i].ar);}
  }
  var rows='';
  for(var ai=0;ai<archs.length;ai++){
    var arc=archs[ai];
    rows+='<tr><td colspan="5" class="rsec">'+esc(arc)+'</td></tr>';
    var subs=[],seenS={};
    for(var i=0;i<TASKS.length;i++){
      if(TASKS[i].ar!==arc)continue;
      if(!seenS[TASKS[i].sub]){seenS[TASKS[i].sub]=true;subs.push(TASKS[i].sub);}
    }
    for(var si=0;si<subs.length;si++){
      var sub=subs[si];
      rows+='<tr><td colspan="5" style="padding:3px 8px;font-size:11px;color:#64748b;font-style:italic">'+esc(sub)+'</td></tr>';
      for(var i=0;i<TASKS.length;i++){
        var t=TASKS[i];
        if(t.ar!==arc||t.sub!==sub)continue;
        var s=getS(t.id);
        if(!leer && s.st==='Offen' && !s.fs && !s.tr) continue;
        var stL=s.st==='NichtGefunden'?'Nicht gef.':s.st==='Ausdruck'?'Ausdruck':s.st;
        var sc=s.st==='Gefunden'?'G':s.st==='Teilbefund'?'T':s.st==='Ausdruck'?'A':s.st==='NichtGefunden'?'N':'O';
        var trunc=s.tr?s.tr.substring(0,100)+(s.tr.length>100?'...':''):'';
        rows+='<tr>';
        rows+='<td style="font-family:monospace;font-size:11px">'+esc(t.sig)+'</td>';
        rows+='<td><strong>'+esc(t.pe)+'</strong><br><span style="font-size:10px;color:#94a3b8">'+esc(t.da)+'</span></td>';
        rows+='<td>'+(leer?'':'<span class="rstat '+sc+'">'+esc(stL)+'</span>')+'</td>';
        rows+='<td style="color:#166534">'+(leer?'':esc(s.fs))+'</td>';
        rows+='<td style="font-size:11px">'+(leer?'':esc(trunc))+'</td>';
        rows+='</tr>';
      }
    }
  }
  return rows;
}

function druckB(leer){
  var datum=new Date().toLocaleDateString('de-AT');
  var titel=leer?'NOTIZBLATT - Archivaufgaben Dresden & Freiberg':'GESAMTBERICHT - Archivaufgaben Dresden & Freiberg';
  var archs=[],seen={};
  for(var i=0;i<TASKS.length;i++){
    if(!seen[TASKS[i].ar]){seen[TASKS[i].ar]=true;archs.push(TASKS[i].ar);}
  }
  var rows='';
  for(var ai=0;ai<archs.length;ai++){
    var arc=archs[ai];
    rows+='<tr class="arc-row"><td colspan="5">'+esc(arc)+'</td></tr>';
    var subs=[],seenS={};
    for(var i=0;i<TASKS.length;i++){
      if(TASKS[i].ar!==arc)continue;
      if(!seenS[TASKS[i].sub]){seenS[TASKS[i].sub]=true;subs.push(TASKS[i].sub);}
    }
    for(var si=0;si<subs.length;si++){
      var sub=subs[si];
      rows+='<tr class="sec-row"><td colspan="5">'+esc(sub)+'</td></tr>';
      for(var i=0;i<TASKS.length;i++){
        var t=TASKS[i];
        if(t.ar!==arc||t.sub!==sub)continue;
        var s=getS(t.id);
        if(!leer && s.st==='Offen' && !s.fs && !s.tr) continue;
        var stL=leer?'':s.st==='NichtGefunden'?'Nicht gef.':s.st==='Ausdruck'?'Ausdruck':s.st;
        rows+='<tr>';
        rows+='<td style="font-family:monospace;font-size:11px;white-space:nowrap">'+esc(t.sig)+'</td>';
        rows+='<td><strong>'+esc(t.pe)+'</strong><br><span style="font-size:10px;color:#666">'+esc(t.da)+'</span></td>';
        rows+='<td style="font-size:11px;font-weight:700">'+esc(stL)+'</td>';
        rows+='<td style="color:#166534">'+(leer?'':esc(s.fs))+'</td>';
        rows+='<td style="font-size:11px">'+(leer?'':esc(s.tr?s.tr.substring(0,100):''))+'</td>';
        rows+='</tr>';
      }
    }
  }

  document.getElementById('po-title').textContent = titel;
  document.getElementById('po-content').innerHTML =
    '<p style="font-size:11px;color:#666;margin-bottom:12px">Wolfgang Pilz &middot; '+datum+'</p>'+
    '<table><thead><tr>'+
    '<th>Signatur</th><th>Person / Datum</th><th>Status</th><th>Fundstelle / Folio</th><th>Transkription</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table>';
  document.getElementById('printoverlay').style.display='block';
  document.getElementById('printoverlay').scrollTop=0;
  closeModal('mBericht');
}

function kopiereText(){
  var a=getAll(),G=0,T=0,A=0,N=0;
  for(var i=0;i<TASKS.length;i++){
    var s=(a[TASKS[i].id]||{}).st||'Offen';
    if(s==='Gefunden')G++; else if(s==='Teilbefund')T++; else if(s==='Ausdruck')A++; else if(s==='NichtGefunden')N++;
  }
  var d=new Date().toLocaleDateString('de-AT');
  var txt='GESAMTBERICHT Archivaufgaben Dresden & Freiberg\nStand: '+d+' | Gefunden: '+G+' | Teilbefund: '+T+' | Ausdruck: '+A+' | Nicht gef.: '+N+'\n\n';
  var lastAr='';
  for(var i=0;i<TASKS.length;i++){
    var t=TASKS[i]; var s=getS(t.id);
    if(s.st==='Offen'&&!s.fs&&!s.tr)continue;
    if(t.ar!==lastAr){txt+='\n=== '+t.ar+' ===\n';lastAr=t.ar;}
    txt+='\n['+s.st+'] '+t.pe+' ('+t.da+') - '+t.sig+'\n';
    if(s.fs)txt+='  Fundstelle: '+s.fs+'\n';
    if(s.tr)txt+='  Transkription: '+s.tr+'\n';
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){toast('Text kopiert!');}).catch(function(){fbCopy(txt);});
  } else { fbCopy(txt); }
}

// ── ANFORDERUNGSLISTE ─────────────────────────────────────────────
function showAnford(){
  var wf=[];

    rows+='<td style="color:#166534;font-weight:600">'+esc(s.fs)+'</td>';

  document.getElementById('aBody').innerHTML=h;
  document.getElementById('mAnf').style.display='block';
}

// ── MARKDOWN ──────────────────────────────────────────────────────
function exportMd(){
  var a=getAll(),G=0,T=0,d=new Date().toLocaleDateString('de-AT');
  for(var i=0;i<TASKS.length;i++){
    var s=(a[TASKS[i].id]||{}).st||'Offen';
    if(s==='Gefunden')G++; else if(s==='Teilbefund')T++;
  }
  var md='# Archivaufgaben Dresden & Freiberg\nStand: '+d+' | Gefunden: '+G+' | Teilbefund: '+T+'\n\n';
  var lastAr='';
  for(var i=0;i<TASKS.length;i++){
    var t=TASKS[i],s=getS(t.id);
    if(s.st==='Offen'&&!s.fs&&!s.tr)continue;
    if(t.ar!==lastAr){md+='\n## '+t.ar+'\n\n';lastAr=t.ar;}
    md+='**['+s.st+']** '+t.pe+' ('+t.da+') - '+t.sig+' - Prio: '+t.pr+'\n';
    if(s.fs)md+='Fundstelle: '+s.fs+'\n';
    if(s.tr)md+='Transkription: '+s.tr+'\n';
    md+='\n';
  }
  fbCopy(md);
  toast('Markdown kopiert!');
}

// ── BACKUP ────────────────────────────────────────────────────────
function doBackup(){
  var data=localStorage.getItem(SK)||'{}';
  try{
    var b=new Blob([data],{type:'application/json'});
    var u=URL.createObjectURL(b);
    var a=document.createElement('a');
    a.href=u; a.download='archiv_backup_'+new Date().toISOString().slice(0,10)+'.json';
    a.click(); URL.revokeObjectURL(u);
    toast('Backup gespeichert');
  }catch(e){toast('Backup-Fehler: '+e.message);}
}
function doLoad(e){
  var f=e.target.files[0]; if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{JSON.parse(ev.target.result);localStorage.setItem(SK,ev.target.result);render();toast('Backup geladen');}
    catch(e){toast('Ungültige Datei');}
  };
  r.readAsText(f);
}

// ── HILFSFUNKTIONEN ───────────────────────────────────────────────
function closeM(id){document.getElementById(id).style.display='none';}
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.style.display='block';
  setTimeout(function(){el.style.display='none';},2500);
}
function esc(s){
  if(!s)return'';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fbCopy(txt){
  var ta=document.createElement('textarea');
  ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
}

document.addEventListener('click',function(e){
  var ids=['mBericht','mAnf'];
  for(var i=0;i<ids.length;i++){
    var m=document.getElementById(ids[i]);
    if(e.target===m)m.style.display='none';
  }
});

window.addEventListener('load',function(){render();});
